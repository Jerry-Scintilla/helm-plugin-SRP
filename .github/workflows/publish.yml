name: Publish to TestPyPI

# バージョンタグ（例: v0.1.2）を push したときに発行する
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# 同一タグの多重実行を防ぐ
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── フロントエンド（Vue + ECharts）をビルドして dist を生成 ──
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: helm_plugin_srp/frontend/package-lock.json

      - name: Build frontend
        working-directory: helm_plugin_srp/frontend
        run: |
          npm ci
          npm run build

      # ── Python wheel をビルド（frontend/dist を同梱）──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write   # Trusted Publishing (OIDC) に必須
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
